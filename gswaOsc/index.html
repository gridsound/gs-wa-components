<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>gswaOsc</title>
<style>
	body {
		display: flex;
		align-items: center;
		justify-content: center;
	}
	pre {
		margin: 0;
	}
</style>
<link rel="stylesheet" type="text/css" href="../assets/fonts/fonts.css" />
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsui.css" />
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsui-flex.css" />
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsui-gray.css" />
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsuiIcon/gsuiIcon.css" />
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsuiCursor/gsuiCursor.css" />
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsuiRipple/gsuiRipple.css" />
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsuiComButton/gsuiComButton.css" />
</head>
<body data-skin="gray">

<gs-flex y g16>
	<h1 style="opacity: .4">gridsound.gswaOsc</h1>
	<gs-flex x g16 style="height: 260px">
		<gs-flex y g8 style="width: 280px">
			<gs-flex x xstart g6 wrap>
				<gsui-com-button disabled text="lfo_gain_sawtooth"></gsui-com-button>
				<gsui-com-button disabled text="ringing"></gsui-com-button>
				<gsui-com-button disabled text="subkeys2_hp"></gsui-com-button>
				<gsui-com-button disabled text="subkeys2_lp"></gsui-com-button>
				<gsui-com-button disabled text="kick"></gsui-com-button>
				<gsui-com-button disabled text="ding"></gsui-com-button>
				<gsui-com-button disabled text="env_lp"></gsui-com-button>
				<gsui-com-button disabled text="env_det"></gsui-com-button>
				<gsui-com-button disabled text="env_gain"></gsui-com-button>
			</gs-flex>
			<gs-flex x xstart g6 wrap style="width: 280px">
				<gsui-com-button type="danger" text="Stop"></gsui-com-button>
				<gsui-com-button type="danger" text="Kill"></gsui-com-button>
			</gs-flex>
			<gs-flex y>
				<gs-flex x ycenter g4>
					<input id="panInput" type="range" min="-1" max="1" step=".01" value="0" />
					<span>pan</span>
				</gs-flex>
				<gs-flex x ycenter g4>
					<input id="gainInput" type="range" min="0" max="1" step=".01" value="1" />
					<span>gain</span>
				</gs-flex>
				<gs-flex x ycenter g4>
					<input id="phaseInput" type="range" min="0" max="1" step=".01" value="0" />
					<span>phase</span>
				</gs-flex>
				<gs-flex x ycenter g4>
					<input id="detuneInput" type="range" min="-1200" max="1200" step="1" value="0" />
					<span>detune</span>
				</gs-flex>
			</gs-flex>
		</gs-flex>
		<pre id="status" style="width: 200px; height: 100%; overflow-y: scroll; background: #0004; scrollbar-width: auto;"></pre>
	</gs-flex>
</gs-flex>

<!-- ....................................................................... -->
<script src="../../gs-utils/gs-utils"></script>
<script src="../../gs-utils/gs-utils-func"></script>
<script src="../../gs-utils/gs-utils-math"></script>
<script src="../../gs-utils/gs-utils-jquery"></script>
<script src="../../gs-utils/gs-utils-audio"></script>
<script src="../../gs-utils/gs-utils-audio-nodes"></script>

<!-- ....................................................................... -->
<script src="../../gs-ui-components/gsui0ne/gsui0ne.js"></script>
<script src="../../gs-ui-components/gsuiRipple/gsuiRipple.js"></script>
<script src="../../gs-ui-components/gsuiComButton/gsuiComButton.js"></script>

<!-- ....................................................................... -->
<script src="../gswaWTbuffers/gswaWTbuffers.js"></script>

<!-- ....................................................................... -->
<script src="gswaOsc.js"></script>

<!-- ....................................................................... -->
<script type="module">
"use strict";

const btns = $( "gsui-com-button:not([type=danger])" );
const btnStop = $( "gsui-com-button[text=Stop]" );
const btnKill = $( "gsui-com-button[text=Kill]" );
const status = $( "#status" );
const panInput = $( "#panInput" );
const gainInput = $( "#gainInput" );
const phaseInput = $( "#phaseInput" );
const detuneInput = $( "#detuneInput" );

const ctx = GSUaudioContext();
let osc = null;

gswaWTbuffers.$wtSet( "sine-to-square", [
	GSUmathWaveSine( 2048 ),
	GSUmathWaveSawtooth( 2048 ),
] );

panInput.$oninput( () => GSUaudioParamSet( osc.pan, +panInput.$value() ) );
gainInput.$oninput( () => GSUaudioParamSet( osc.gain, +gainInput.$value() ) );
phaseInput.$oninput( () => GSUaudioParamSet( osc.phase, +phaseInput.$value() ) );
detuneInput.$oninput( () => GSUaudioParamSet( osc.detune, +detuneInput.$value() ) );

function log( msg ) {
	status.$text( status.$text() + msg + "\n" ).$scrollY( Infinity );
}

function setup() {
	log( "Init..." );
	return gswaOsc.$oscLoadModule( ctx ).then( () => {
		osc = new gswaOsc( ctx );
		osc.$oscConnect( ctx.destination );
		osc.$oscWavetable( gswaWTbuffers.$wtGetSharedBuffer( "sine-to-square" ) );
		$( "input[type=range]" ).$trigger( "oninput" );
		btns.$disabled( false );
		log( "Ready." );
	} );
}

function ctxIsReady() {
	if ( ctx.state === "suspended" ) {
		log( `Context suspended: ${ ctx.currentTime.toFixed( 3 ) }s` );
		ctx.resume();
		return false;
	}
	return true;
}

btnKill.$onclick( () => {
	osc.$oscKill();
	log( `Osc killed: ${ ctx.currentTime.toFixed( 3 ) }s` );
} );

btnStop.$onclick( () => {
	osc.$oscClear();
	log( `Osc cleared: ${ ctx.currentTime.toFixed( 3 ) }s` );
} );

btns.$onclick( e => {
	if ( ctxIsReady() ) {
		const tar = $( e.target );
		const name = tar.$getAttr( "text" );
		const now = ctx.currentTime + .1;

		examples[ name ]( now );
		log( `Push "${ name }": ${ now.toFixed( 3 ) }s` );
	}
} );

setup().catch( err => log( "Setup error: " + err.message ) );

const envDefault = {
	attack: 1,
	hold: 1,
	decay: 1,
	sustain: .2,
	release: 1,
};

const examples = {
	lfo_gain_sawtooth: when => {
		osc.$oscPushNote( GSUuuid(), {
			lfos: {
				gain: {
					wave: "sawtooth",
					attack: 4,
					frequency: 4,
					amp: -1,
				},
			},
			keys: [
				{ when, duration: 60, frequency: 400, gain: .5, wtpos: 0 },
			],
		} );
	},
	ringing: when => {
		for ( let i = 0; i < 32; ++i ) {
			osc.$oscPushNote( GSUuuid(), {
				envs: {
					gain: {
						release: .08,
					},
				},
				keys: [ { when: when + i * 2, duration: 1, frequency: 440, gain: .5 } ],
			} );
			osc.$oscPushNote( GSUuuid(), {
				envs: {
					gain: {
						release: .08,
					},
				},
				keys: [ { when: when + i * 2, duration: 1, frequency: 400, gain: .5 } ],
			} );
		}
	},
	subkeys2_hp: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: {
					attack: 0.01,
					decay: 0.1,
					sustain: 0.2,
					release: 1,
				},
			},
			keys: [
				{ when: when + 0.0, duration: 0.5, frequency: 100, gain: 1, wtpos: 1, highpass: 1.0 },
				{ when: when + 0.7, duration: 0.2, frequency: 100, gain: 1, wtpos: 1, highpass: 0.3 },
			],
		} );
	},
	subkeys2_lp: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: {
					attack: 0.01,
					decay: 0.1,
					sustain: 0.2,
					release: 1,
				},
			},
			keys: [
				{ when: when + 0.0, duration: 0.5, frequency: 100, gain: 1, wtpos: 1, lowpass: 1.0 },
				{ when: when + 0.7, duration: 0.2, frequency: 100, gain: 1, wtpos: 1, lowpass: 0.3 },
			],
		} );
	},
	ding: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: {
					attack: .01,
					decay: .1,
					sustain: .02,
					release: .3,
				},
			},
			keys: [
				{ when, duration: .11, frequency: 880, gain: 1 },
			],
		} );
	},
	kick: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: {
					release: .2,
				},
				detune: {
					attack: 0,
					hold: .005,
					decay: .02,
					sustain: 0,
					pitch: 8000,
				},
			},
			keys: [
				{ when, duration: .15, frequency: 60, gain: 1 },
			],
		} );
	},
	env_lp: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: { release: envDefault.release },
				lowpass: { ...envDefault, q: 1 },
			},
			keys: [
				{ when, duration: 4, frequency: 100, gain: 1, wtpos: 1 },
			],
		} );
	},
	env_det: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: { release: envDefault.release },
				detune: { ...envDefault, pitch: 1200 },
			},
			keys: [
				{ when, duration: 4, frequency: 300, gain: .5 },
			],
		} );
	},
	env_gain: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: { ...envDefault },
			},
			keys: [
				{ when, duration: 4, frequency: 300, gain: .5, wtpos: 1 },
			],
		} );
	},
};
</script>
</body>
</html>
