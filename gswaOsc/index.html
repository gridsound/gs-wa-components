<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>gswaOsc</title>
<style>
	body {
		display: flex;
		align-items: center;
		flex-direction: column;
		justify-content: center;
		height: 100vh;
		margin: 0;
		color: #fff;
		font-family: system-ui, sans-serif;
		background-color: #111;
	}
	button {
		padding: 16px 28px;
		border-radius: 6px;
		border: none;
		color: #fff;
		font-size: 20px;
		cursor: pointer;
		background-color: #4a5;

		&:disabled {
			background: #555;
			cursor: not-allowed;
		}
	}
	#status {
		margin-top: 16px;
		font-family: monospace;
		white-space: pre;
		color: #9ad;
	}
</style>
</head>
<body>

<button id="playBtn" disabled>Loading…</button>
<div id="status"></div>

<!-- ....................................................................... -->
<script src="../../gs-utils/gs-utils"></script>
<script src="../../gs-utils/gs-utils-math"></script>
<script src="../../gs-utils/gs-utils-audio"></script>
<script src="../../gs-utils/gs-utils-audio-nodes"></script>
<script src="../../gs-utils/gs-utils-jquery"></script>

<!-- ....................................................................... -->
<script src="../gswaWTbuffers/gswaWTbuffers.js"></script>

<!-- ....................................................................... -->
<script src="gswaOsc.js"></script>

<!-- ....................................................................... -->
<script type="module">
"use strict";

const btn = $( "#playBtn" );
const status = $( "#status" );
const ctx = GSUaudioContext();
const sab = gswaWTbuffers.$wtGetSharedBuffer( "sine" );
let osc = null;

function log( msg ) {
	status.$text( status.$text() + msg + "\n" );
	lg( msg );
}

function setup() {
	return gswaOsc.$oscLoadModule( ctx ).then( () => {
		osc = new gswaOsc( ctx );
		osc.$oscConnect( ctx.destination );
		osc.$oscWavetable( sab );
		// GSUaudioParamSet( osc.pan, 0 );
		// GSUaudioParamSet( osc.gain, 1 );
		// GSUaudioParamSet( osc.phase, 0 );
		// GSUaudioParamSet( osc.detune, 1200 );

		btn.$disabled( false ).$text( "Play" );
	} );
}

btn.$onclick( () => {
	const now = ctx.currentTime + .05;

	if ( ctx.state === "suspended" ) {
		log( `Context suspended: ${ now.toFixed( 3 ) }s` );
		ctx.resume();
	} else {
		const d = 1;

		osc.$oscPushNote( "note1", [
			{ when: now + 0, duration: d, frequency: 400 },
			{ when: now + 2, duration: d, frequency: 800, gain: .1 },
			{ when: now + 4, duration: d, frequency: 200 },
		] );
		osc.$oscPushNote( "note2", [
			{ when: now + 0, duration: d, frequency: 440 },
			{ when: now + 2, duration: d, frequency: 880, gain: .1 },
			{ when: now + 4, duration: d, frequency: 220 },
		] );
		log( `Push notes: ${ now.toFixed( 3 ) }s` );
	}
} );

setup().catch( err => log( "Setup error: " + err.message ) );
</script>
</body>
</html>
