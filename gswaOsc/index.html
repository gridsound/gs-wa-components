<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>gswaOsc</title>
<link rel="stylesheet" type="text/css" href="../assets/fonts/fonts.css"/>
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsui.css"/>
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsui-flex.css"/>
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsui-gray.css"/>
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsuiIcon/gsuiIcon.css"/>
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsuiCursor/gsuiCursor.css"/>
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsuiRipple/gsuiRipple.css"/>
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsuiComButton/gsuiComButton.css"/>
<link rel="stylesheet" type="text/css" href="../../gs-ui-components/gsuiAnalyserHist/gsuiAnalyserHist.css"/>
</head>
<body data-skin="gray" style="display: flex; align-items: center; justify-content: center">

<gs-flex y g16 style="width: 800px">
	<gs-flex x g16>
		<h1 style="opacity: .4">gridsound.gswaOsc</h1>
		<input type="range" id="appGain" min="0" max="1" step=".01" value=".4" style="width: 60px"/>
	</gs-flex>
	<gs-flex x g16>
		<gs-flex y g16 style="flex: 5">
			<gs-flex id="examples" x xstart g6 wrap></gs-flex>
			<gs-flex x xstart g6 wrap style="width: 280px">
				<gsui-com-button type="danger" text="Stop"></gsui-com-button>
				<gsui-com-button type="danger" text="Kill"></gsui-com-button>
			</gs-flex>
			<gs-flex y xstart g8>
				<label style="display: flex; align-items: center; gap: 8px"><input type="radio" name="oscSource" value="wavetable"/><span>wavetable</span></label>
				<label style="display: flex; align-items: center; gap: 8px"><input type="radio" name="oscSource" value="noise_white"/><span>noise-white</span></label>
				<label style="display: flex; align-items: center; gap: 8px"><input type="radio" name="oscSource" value="noise_pink"/><span>noise-pink</span></label>
				<label style="display: flex; align-items: center; gap: 8px"><input type="radio" name="oscSource" value="noise_brown"/><span>noise-brown</span></label>
				<label style="display: flex; align-items: center; gap: 8px"><input type="radio" name="oscSource" value="buffer"/><span>buffer</span></label>
			</gs-flex>
			<gs-flex y>
				<gs-flex x ycenter g4>
					<input id="panInput" type="range" min="-1" max="1" step=".01" value="0"/>
					<span>pan</span>
				</gs-flex>
				<gs-flex x ycenter g4>
					<input id="gainInput" type="range" min="0" max="1" step=".01" value="1"/>
					<span>gain</span>
				</gs-flex>
				<gs-flex x ycenter g4>
					<input id="phaseInput" type="range" min="0" max="1" step=".01" value="0"/>
					<span>phase</span>
				</gs-flex>
				<gs-flex x ycenter g4>
					<input id="detuneInput" type="range" min="-1200" max="1200" step="1" value="0"/>
					<span>detune</span>
				</gs-flex>
				<gs-flex x ycenter g4>
					<input id="unisonvoicesInput" type="range" min="1" max="9" step="1" value="1"/>
					<span>unison-voices</span>
				</gs-flex>
				<gs-flex x ycenter g4>
					<input id="unisondetuneInput" type="range" min="0" max="200" step=".01" value="0"/>
					<span>unison-detune</span>
				</gs-flex>
				<gs-flex x ycenter g4>
					<input id="unisonblendInput" type="range" min="0" max="1" step=".01" value="0"/>
					<span>unison-blend</span>
				</gs-flex>
			</gs-flex>
		</gs-flex>
		<gs-flex style="position: relative; flex: 3">
			<pre id="status" style="position: absolute; inset: 0; margin: 0; overflow-y: scroll; background: #0004; scrollbar-width: auto"></pre>
		</gs-flex>
		<gs-flex style="position: relative; flex: 1">
			<gsui-analyser-hist type="hz"></gsui-analyser-hist>
		</gs-flex>
		<gs-flex style="position: relative; flex: 1">
			<gsui-analyser-hist type="td"></gsui-analyser-hist>
		</gs-flex>
	</gs-flex>
</gs-flex>

<!-- ....................................................................... -->
<script src="../../gs-utils/gs-utils"></script>
<script src="../../gs-utils/gs-utils-func"></script>
<script src="../../gs-utils/gs-utils-math"></script>
<script src="../../gs-utils/gs-utils-jquery"></script>
<script src="../../gs-utils/gs-utils-audio"></script>
<script src="../../gs-utils/gs-utils-audio-nodes"></script>

<!-- ....................................................................... -->
<script src="../../gs-ui-components/gsui0ne/gsui0ne.js"></script>
<script src="../../gs-ui-components/gsuiRipple/gsuiRipple.js"></script>
<script src="../../gs-ui-components/gsuiComButton/gsuiComButton.js"></script>
<script src="../../gs-ui-components/gsuiAnalyserHz/gsuiAnalyserHz.js"></script>
<script src="../../gs-ui-components/gsuiAnalyserHist/gsuiAnalyserHist.js"></script>

<!-- ....................................................................... -->
<script src="../gswaBuffers/gswaBuffers.js"></script>

<!-- ....................................................................... -->
<script src="gswaOsc.js"></script>

<!-- ....................................................................... -->
<script type="module">
"use strict";

const C5 = 1046.5;
const C4 = 523.251;

const envDefault = {
	attack: 1,
	hold: 1,
	decay: 1,
	sustain: .2,
	release: 1,
};

const examples = {
	sine: when => {
		osc.$oscPushNote( GSUuuid(), {
			keys: [
				{ when, duration: 60, frequency: C4, gain: 1 },
			],
		} );
	},
	saw: when => {
		osc.$oscPushNote( GSUuuid(), {
			keys: [
				{ when, duration: 60, frequency: C4, gain: 1, wtpos: 1 },
			],
		} );
	},
	lfoDt_amp_anim: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: {
					release: 1,
				},
			},
			lfos: {
				detune: {
					wave: "sine",
					delay: .2,
					attack: 1,
					frequency: 8,
					amp: 1200,
				},
			},
			keys: [
				{ when: when + 0, duration: 1, frequency: 400, gain: .5, lfoDetuneAmp: 1.00 },
				{ when: when + 3, duration: 1, frequency: 400, gain: .5, lfoDetuneAmp: 0.00 },
			],
		} );
	},
	lfoDt_hz_anim: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: {
					release: 1,
				},
			},
			lfos: {
				detune: {
					wave: "sine",
					delay: .2,
					attack: 1,
					frequency: 8,
					amp: 1200,
				},
			},
			keys: [
				{ when: when + 0, duration: 1, frequency: 400, gain: .5, lfoDetuneFrequency: 1.00 },
				{ when: when + 3, duration: 1, frequency: 400, gain: .5, lfoDetuneFrequency: 0.00 },
			],
		} );
	},
	lfoGn_amp_anim: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: {
					release: 1,
				},
			},
			lfos: {
				gain: {
					wave: "sine",
					attack: .3,
					frequency: 8,
					amp: 1,
				},
			},
			keys: [
				{ when: when + 0, duration: 1, frequency: 400, gain: .5, lfoGainAmp: 1.00 },
				{ when: when + 3, duration: 1, frequency: 400, gain: .5, lfoGainAmp: 0.00 },
			],
		} );
	},
	lfoGn_hz_anim: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: {
					release: 1,
				},
			},
			lfos: {
				gain: {
					wave: "sine",
					attack: .3,
					frequency: 8,
					amp: 1,
				},
			},
			keys: [
				{ when: when + 0, duration: 1, frequency: 400, gain: .5, lfoGainFrequency: 1.00 },
				{ when: when + 3, duration: 1, frequency: 400, gain: .5, lfoGainFrequency: 0.00 },
			],
		} );
	},
	lfoDt_squ_att: when => {
		osc.$oscPushNote( GSUuuid(), {
			lfos: {
				detune: {
					wave: "square",
					attack: 2,
					frequency: 2,
					amp: 1200,
				},
			},
			keys: [
				{ when, duration: 60, frequency: 400, gain: .5 },
			],
		} );
	},
	lfoDt_squ: when => {
		osc.$oscPushNote( GSUuuid(), {
			lfos: {
				detune: {
					wave: "square",
					frequency: 2,
					amp: 1200,
				},
			},
			keys: [
				{ when, duration: 60, frequency: 400, gain: .5 },
			],
		} );
	},
	lfoDt_squ_fake: when => {
		for ( let i = 0; i < 100; ++i ) {
			osc.$oscPushNote( GSUuuid(), {
				keys: [ { when: when + i * .5 + 0.00, duration: .25, frequency: 800, gain: .5 } ],
			} );
			osc.$oscPushNote( GSUuuid(), {
				keys: [ { when: when + i * .5 + 0.25, duration: .25, frequency: 200, gain: .5 } ],
			} );
		}
	},
	lfoDt_sin: when => {
		osc.$oscPushNote( GSUuuid(), {
			lfos: {
				detune: {
					wave: "sine",
					attack: 1,
					frequency: 4,
					amp: 1200,
				},
			},
			keys: [
				{ when, duration: 60, frequency: 400, gain: .5, wtpos: 0 },
			],
		} );
	},
	lfoGn_sin: when => {
		osc.$oscPushNote( GSUuuid(), {
			lfos: {
				gain: {
					wave: "sine",
					attack: 1,
					frequency: 4,
					amp: 1,
				},
			},
			keys: [
				{ when, duration: 60, frequency: 400, gain: .5, wtpos: 0 },
			],
		} );
	},
	lfoGn_saw: when => {
		osc.$oscPushNote( GSUuuid(), {
			lfos: {
				gain: {
					wave: "sawtooth",
					attack: 4,
					frequency: 4,
					amp: -1,
				},
			},
			keys: [
				{ when, duration: 60, frequency: 400, gain: .5, wtpos: 0 },
			],
		} );
	},
	ringing: when => {
		for ( let i = 0; i < 32; ++i ) {
			osc.$oscPushNote( GSUuuid(), {
				envs: {
					gain: {
						release: .08,
					},
				},
				keys: [ { when: when + i * 2, duration: 1, frequency: 440, gain: .5 } ],
			} );
			osc.$oscPushNote( GSUuuid(), {
				envs: {
					gain: {
						release: .08,
					},
				},
				keys: [ { when: when + i * 2, duration: 1, frequency: 400, gain: .5 } ],
			} );
		}
	},
	subkeys2_hp: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: {
					attack: 0.01,
					decay: 0.1,
					sustain: 0.2,
					release: 1,
				},
			},
			keys: [
				{ when: when + 0.0, duration: 0.5, frequency: 100, gain: 1, wtpos: 1, highpass: 1.0 },
				{ when: when + 0.7, duration: 0.2, frequency: 100, gain: 1, wtpos: 1, highpass: 0.3 },
			],
		} );
	},
	subkeys2_lp: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: {
					attack: 0.01,
					decay: 0.1,
					sustain: 0.2,
					release: 1,
				},
			},
			keys: [
				{ when: when + 0.0, duration: 0.5, frequency: 100, gain: 1, wtpos: 1, lowpass: 1.0 },
				{ when: when + 0.7, duration: 0.2, frequency: 100, gain: 1, wtpos: 1, lowpass: 0.3 },
			],
		} );
	},
	ding: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: {
					attack: .01,
					decay: .1,
					sustain: .02,
					release: .3,
				},
			},
			keys: [
				{ when, duration: .11, frequency: 880, gain: 1 },
			],
		} );
	},
	kick: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: {
					release: .2,
				},
				detune: {
					attack: 0,
					hold: .005,
					decay: .02,
					sustain: 0,
					pitch: 8000,
				},
			},
			keys: [
				{ when, duration: .15, frequency: 60, gain: 1 },
			],
		} );
	},
	envLP: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: { release: envDefault.release },
				lowpass: { ...envDefault, q: 1 },
			},
			keys: [
				{ when, duration: 4, frequency: 100, gain: 1, wtpos: 1 },
			],
		} );
	},
	envDt: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: { release: envDefault.release },
				detune: { ...envDefault, pitch: 1200 },
			},
			keys: [
				{ when, duration: 4, frequency: 300, gain: .5 },
			],
		} );
	},
	envGn: when => {
		osc.$oscPushNote( GSUuuid(), {
			envs: {
				gain: { ...envDefault },
			},
			keys: [
				{ when, duration: 4, frequency: 300, gain: .8, wtpos: 0 },
			],
		} );
	},
};

const appGain = $( "#appGain" );
const btns = $( Object.keys( examples ).map( n => $.$elem( "gsui-com-button", { disabled: true, text: n } ) ) );
const btnStop = $( "gsui-com-button[text=Stop]" );
const btnKill = $( "gsui-com-button[text=Kill]" );
const status = $( "#status" );
const panInput = $( "#panInput" );
const gainInput = $( "#gainInput" );
const phaseInput = $( "#phaseInput" );
const detuneInput = $( "#detuneInput" );
const unisonvoicesInput = $( "#unisonvoicesInput" );
const unisondetuneInput = $( "#unisondetuneInput" );
const unisonblendInput = $( "#unisonblendInput" );
const uiAnaly = $( "gsui-analyser-hist" );
const oscSource = $( "[name=oscSource]" );

$( "#examples" ).$append( btns );

const ctx = GSUaudioContext();
let dest = null;
let osc = null;
let split = null;
let waAnL = null;
let waAnR = null;
const fftSize = 2048;
const dataChanL = new Float32Array( fftSize / 2 );
const dataChanR = new Float32Array( fftSize / 2 );

gswaBuffers.$sabSetWavetable( "sine-to-square", [
	GSUmathWaveSine( 2048 ),
	GSUmathWaveSawtooth( 2048 ),
] );

appGain.$oninput( () => GSUaudioParamSet( dest.gain, +appGain.$value() ) );
panInput.$oninput( () => GSUaudioParamSet( osc.pan, +panInput.$value() ) );
gainInput.$oninput( () => GSUaudioParamSet( osc.gain, +gainInput.$value() ) );
phaseInput.$oninput( () => GSUaudioParamSet( osc.phase, +phaseInput.$value() ) );
detuneInput.$oninput( () => GSUaudioParamSet( osc.detune, +detuneInput.$value() ) );
unisonvoicesInput.$oninput( () => GSUaudioParamSet( osc.unisonvoices, +unisonvoicesInput.$value() ) );
unisondetuneInput.$oninput( () => GSUaudioParamSet( osc.unisondetune, +unisondetuneInput.$value() ) );
unisonblendInput.$oninput( () => GSUaudioParamSet( osc.unisonblend, +unisonblendInput.$value() ) );

oscSource.$onchange( e => {
	switch ( e.target.value ) {
		case "buffer": osc.$oscSource( "buffer", ...gswaBuffers.$sabGetBuffer( "piano" ) ); break;
		case "wavetable": osc.$oscSource( "wavetable", gswaBuffers.$sabGetWavetable( "sine-to-square" ) ); break;
		case "noise_white": osc.$oscSource( "noise", "white" ); break;
		case "noise_pink": osc.$oscSource( "noise", "pink" ); break;
		case "noise_brown": osc.$oscSource( "noise", "brown" ); break;
	}
	log( `Source: "${ e.target.value }"` );
} );

function log( msg ) {
	status.$text( status.$text() + msg + "\n" ).$scrollY( 9999999 );
}

function setup() {
	log( "Init..." );
	uiAnaly.$setAttr( "resolution", `${ uiAnaly.$width() } ${ uiAnaly.$height() }` );
	return fetch( "piano-c5.wav" )
		.then( res => res.arrayBuffer() )
		.then( arr => ctx.decodeAudioData( arr ) )
		.then( buf => gswaBuffers.$sabSetBuffer( "piano", buf ) )
		.then( () => gswaOsc.$oscLoadModule( ctx ) )
		.then( () => {
			dest = GSUaudioGain( ctx );
			waAnL = GSUaudioAnalyser( ctx );
			waAnR = GSUaudioAnalyser( ctx );
			waAnL.fftSize =
			waAnR.fftSize = fftSize;
			waAnL.smoothingTimeConstant =
			waAnR.smoothingTimeConstant = 0;
			split = GSUaudioChannelSplitter( ctx, 2 );
			split.connect( waAnL, 0 );
			split.connect( waAnR, 1 );
			osc = new gswaOsc( ctx );
			osc.$oscConnect( split );
			osc.$oscConnect( dest );
			dest.connect( ctx.destination );
			oscSource.$filter( "[value=buffer]" ).$click();
			$( "input[type=range]" ).$trigger( "oninput" );
			btns.$disabled( false );
			log( "Ready." );
			GSUsetInterval( loop );
		} );
}

function loop() {
	waAnL.getFloatFrequencyData( dataChanL );
	waAnR.getFloatFrequencyData( dataChanR );
	uiAnaly.$get( 0 ).$draw( dataChanL, dataChanR );
	waAnL.getFloatTimeDomainData( dataChanL );
	waAnR.getFloatTimeDomainData( dataChanR );
	uiAnaly.$get( 1 ).$draw( dataChanL, dataChanR );
}

function ctxIsReady() {
	if ( ctx.state === "suspended" ) {
		log( `Context suspended: ${ ctx.currentTime.toFixed( 3 ) }s` );
		ctx.resume();
		return false;
	}
	return true;
}

btnKill.$onclick( () => {
	osc.$oscKill();
	log( `Osc killed: ${ ctx.currentTime.toFixed( 3 ) }s` );
} );

btnStop.$onclick( () => {
	osc.$oscClear();
	log( `Osc cleared: ${ ctx.currentTime.toFixed( 3 ) }s` );
} );

btns.$onclick( e => {
	if ( ctxIsReady() ) {
		const tar = $( e.target );
		const name = tar.$getAttr( "text" );
		const now = ctx.currentTime + .1;

		examples[ name ]( now );
		log( `Push "${ name }": ${ now.toFixed( 3 ) }s` );
	}
} );

setup().catch( err => log( "Setup error: " + err.message ) );
</script>
</body>
</html>
